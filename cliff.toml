[changelog]
header = """# Changelog

All notable changes to this project are documented here.
Versions follow [Semantic Versioning](https://semver.org/).
Format follows [Keep a Changelog](https://keepachangelog.com/).

"""
body = """
{% set has_commits = commits | length > 0 %}\
{% if version and has_commits %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% elif not version %}\
## [Unreleased]
{% endif %}\
{% if has_commits %}\
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.breaking %} ⚠ BREAKING CHANGE{% endif %}

{% endfor %}
{% endfor %}\
{% endif %}\
"""
footer = ""
trim = true

[git]
commit_preprocessors = [
    { pattern = "^\\s+",                 replace = ""           },
    { pattern = "^Merge pull request.*", replace = "chore: merge" },
    { pattern = "^Merge branch.*",       replace = "chore: merge" },
    { pattern = "<([^>]+)>",             replace = "`$1`"       },
    { pattern = "^([A-Z].*)",              replace = "chore: $1"  },
    { pattern = "^(--.+)",                 replace = "chore: $1"  },
    { pattern = "^([a-z]+[^:!(a-z].*)",     replace = "chore: $1"  },
    { pattern = "^([a-z]+)$",               replace = "chore: $1"  },
]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
    { message = "^feat",               group = "Added"         },
    { message = "^fix",                group = "Fixed"         },
    { message = "^perf",               group = "Performance"   },
    { message = "^refactor",           group = "Changed"       },
    { message = "^docs",               group = "Documentation" },
    { body    = ".*security",          group = "Security"      },
    { message = "^chore\\(release\\)", skip = true             },
    { message = "^chore",              skip = true             },
    { message = "^ci",                 skip = true             },
    { message = "^style",              skip = true             },
    { message = "^test",               skip = true             },
    { message = "^build",              skip = true             },
    { message = "^init",               skip = true             },
    { message = ".*",                  skip = true             },
]

protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

[remote.github]
# auto-detected from git remote — no hardcoded repo slug
